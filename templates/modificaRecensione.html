{% extends 'base.html' %}

{% block title %}Modifica Recensione - TechStore{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4">
            <h3 class="fw-bold mb-2">Modifica la tua recensione</h3>
            <p class="text-muted small mb-4">Stai modificando la valutazione per il prodotto: <strong class="text-primary">{{ product.name }}</strong></p>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Il tuo Voto:</label>
                    {{ form.rating }}
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Il tuo Commento:</label>
                    {{ form.comment }}
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary fw-bold px-4">
                        Salva Modifiche
                    </button>
                    <a href="{% url 'product_detail' product.id %}" class="btn btn-outline-secondary">
                        Annulla
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
